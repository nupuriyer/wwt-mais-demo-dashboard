<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWT | Agentic Proving Ground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: #0073e6;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(0, 115, 230, 0.3);
        }
        .agent-icon {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans antialiased">

    <header class="border-b border-white/5 p-6 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-blue-600/20">W</div>
                <h1 class="text-xl font-bold tracking-tight text-white">Marketing <span class="text-blue-500">Agentic Proving Ground</span></h1>
            </div>
            <div class="flex gap-4 items-center">
                <div id="api-status" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Systems Ready
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
            <div class="glass-card p-5 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Active Agents</p>
                <p class="text-3xl font-light text-white">09</p>
            </div>
            <div class="glass-card p-5 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Engine Status</p>
                <p class="text-3xl font-light text-blue-400 font-mono">LIVE</p>
            </div>
            <div class="glass-card p-5 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Data Signals</p>
                <p class="text-3xl font-light text-emerald-400">OPTIMIZED</p>
            </div>
            <div class="glass-card p-5 rounded-2xl">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Workflow</p>
                <p class="text-3xl font-light text-purple-400 italic">Portfolio</p>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-8">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Operational Suite</span>
            <div class="h-px bg-white/5 flex-1"></div>
        </div>

        <div id="agent-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-[#0b1120]/95 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#1e293b] w-full max-w-2xl rounded-3xl border border-white/10 shadow-2xl relative overflow-hidden animate-in zoom-in-95 duration-200">
            <div class="p-4 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div id="modal-icon" class="p-2 bg-blue-600/20 rounded text-blue-400"></div>
                    <h3 id="modal-title" class="font-bold text-white">Agent Action</h3>
                </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white p-2">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="modal-content" class="p-8"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
