<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWT | Marketing Agentic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* WWT Professional Dark Theme */
        body { 
            background-color: #0b1120; 
            color: #94a3b8; 
            font-family: 'Public Sans', sans-serif; 
        }
        
        .card {
            background: #0f172a;
            border-radius: 0.75rem;
            border: 1px solid #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover { 
            border-color: #3b82f6; 
            transform: translateY(-2px);
        }

        #action-stage {
            min-height: 240px;
            border: 2px dashed #1e293b;
            background: #0b1120;
            transition: all 0.4s ease;
        }
        
        #action-stage-wrapper.active {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-white">WWT <span class="text-blue-500 font-light">Marketing Ops</span></h1>
                <p class="text-xs uppercase tracking-widest text-slate-500">Agentic Workflow Proving Ground</p>
            </div>
            <span class="bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-blue-500/20">v2.0 Stable</span>
        </div>

        <div id="action-stage-wrapper" class="card p-6 mb-8 overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-[10px] font-bold uppercase text-slate-500 tracking-widest">Active Workspace</h2>
                <button onclick="clearStage()" class="text-[10px] text-slate-400 hover:text-red-400 uppercase font-bold transition-colors">Clear Stage</button>
            </div>
            <div id="action-stage" class="rounded-xl p-8 flex items-center justify-center">
                <div id="stage-placeholder" class="text-center">
                    <div class="text-slate-700 mb-2"><i data-lucide="mouse-pointer-2" class="mx-auto w-8 h-8"></i></div>
                    <p class="text-xs text-slate-500 uppercase tracking-tight">Select an agent from the switchboard below</p>
                </div>
                <div id="stage-content" class="hidden w-full"></div>
            </div>
        </div>

        <div class="flex justify-center mt-12 pb-20">
            <div id="agent-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 w-full max-w-5xl justify-items-center">
                </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
