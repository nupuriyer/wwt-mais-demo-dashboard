<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWT | Marketing Agentic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
    body { background-color: #0b1120; color: #94a3b8; font-family: 'Public Sans', sans-serif; overflow-x: hidden; }
    
    .card {
        background: #0f172a;
        border-radius: 1rem;
        border: 1px solid #1e293b;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth, reactive timing */
    }

    /* THE DESKTOP FIX: Side-by-side with breathing room */
    @media (min-width: 1024px) {
        #agent-grid {
            display: flex !important;
            flex-direction: row !important;
            justify-content: center; /* Centers the whole row */
            gap: 1.5rem; /* Space between buttons */
            padding: 2rem 0;
        }
        .agent-button {
            flex: 0 1 130px; /* Allows them to shrink slightly if needed */
            height: 110px;
        }
    }

    /* REAECTIVE MOVEMENTS */
    .agent-button:hover {
        transform: translateY(-8px) scale(1.05);
        border-color: #3b82f6;
        background: #1e293b;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(59, 130, 246, 0.1);
    }

    /* THE PHONE LOOK: Stays perfect */
    @media (max-width: 1023px) {
        #agent-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
    }

    /* MORE STAGE SPACE */
    #action-stage {
        min-height: 350px; /* Increased for more room */
        border: 2px dashed #1e293b;
        background: #0b1120;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    #action-stage-wrapper.active {
        border-color: #3b82f6;
    }

/* --- ADD THIS AT THE BOTTOM OF YOUR STYLE BLOCK --- */

/* The Switch Container */
.switch {
  position: relative;
  display: inline-block;
  width: 38px;
  height: 20px;
}

/* Hide default HTML checkbox */
.switch input { opacity: 0; width: 0; height: 0; }

/* The Slider */
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #1e293b;
  transition: .3s;
  border-radius: 20px;
  border: 1px solid #334155;
}

.slider:before {
  position: absolute;
  content: "";
  height: 14px; width: 14px;
  left: 3px; bottom: 2px;
  background-color: #94a3b8;
  transition: .3s;
  border-radius: 50%;
}

input:checked + .slider { background-color: #3b82f6; border-color: #60a5fa; }
input:checked + .slider:before { transform: translateX(18px); background-color: white; }

/* AI Mode Glow Effect */
.ai-active-border {
    border-color: #3b82f6 !important;
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
}
        
</style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-white">WWT <span class="text-blue-500 font-light">Marketing Ops</span></h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-500">Agentic Workflow Proving Ground</p>
            </div>
            <span class="bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-blue-500/20">v2.0 Stable</span>
        </div>

        <div id="action-stage-wrapper" class="card p-6 mb-8 overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-[10px] font-bold uppercase text-slate-500 tracking-widest">Active Workspace</h2>
                <button onclick="clearStage()" class="clear-btn text-[10px] text-slate-400 hover:text-red-400 uppercase font-bold transition-colors">
                    Clear Stage ✕
                </button>
            </div>
            <div id="action-stage" class="rounded-xl p-8 flex items-center justify-center">
                <div id="stage-placeholder" class="text-center">
                    <div class="text-slate-700 mb-2"><i data-lucide="mouse-pointer-2" class="mx-auto w-8 h-8"></i></div>
                    <p class="text-xs text-slate-500 uppercase tracking-tight italic">Select an agent from the switchboard</p>
                </div>
                <div id="stage-content" class="hidden w-full"></div>
            </div>
        </div>

        <div class="flex justify-center mt-12 pb-20">
            <div id="agent-grid" class="flex flex-wrap justify-center gap-4 w-full max-w-5xl">
                </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
