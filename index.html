<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>WWT | Marketing Agentic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Safety Fallback for Inputs if Tailwind Fails */
        input, textarea, select {
            color: #f1f5f9 !important; /* High contrast white/slate-50 */
            background-color: #0f172a !important; /* Slate-900 background */
            border: 1px solid #334155 !important; /* Slate-700 border */
            padding: 12px !important;
            border-radius: 8px !important;
        }
        
        /* Ensure placeholder is visible but distinct */
        input::placeholder {
            color: #64748b !important; /* Slate-500 */
            opacity: 1;
        }
        
        /* Focus state for desktop accessibility */
        input:focus {
            border-color: #3b82f6 !important; /* WWT Blue */
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        
        /* Grid Brute Force */
        /* Remove the repeat(5, 1fr) entirely */
        #agent-grid {
            display: grid !important;
            gap: 1.5rem !important; /* Give them more breathing room */
            width: 100% !important;
        }
        @media (min-width: 768px) { #agent-grid { grid-template-columns: repeat(5, 1fr) !important; } }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">WWT <span class="text-blue-500 font-light">Marketing Ops</span></h1>
                <p class="text-slate-400">Agentic Proving Ground v2.0</p>
            </div>
            <div class="flex items-center gap-4 bg-slate-800/50 p-2 px-4 rounded-2xl border border-slate-700 transition-all" id="ai-status-container">
                <div id="ai-glow-dot" class="w-2 h-2 rounded-full bg-slate-600 transition-all duration-500"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">AI Mode</span>
                <label class="switch">
                    <input type="checkbox" id="universal-ai-toggle" onchange="toggleUniversalAI(this)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div id="action-stage-wrapper" class="card p-8">
            <div id="action-stage" class="rounded-2xl bg-slate-900/50 border-2 border-dashed border-slate-700 p-8 min-h-[300px] flex items-center justify-center">
                <div id="stage-placeholder" class="text-center">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="layout-grid" class="w-8 h-8 text-slate-600"></i>
                    </div>
                    <p class="text-slate-500 font-medium">Select an agent from the board below</p>
                </div>
                <div id="stage-content" class="hidden w-full"></div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-blue-400">Active Agents</h3>
            <div id="agent-grid"></div>
        </div>
    </div>
    <script src="env.js"></script>
    <script src="app.js"></script>
</body>
</html>
