<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWT | Workflow Agents Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: #00a3e0; /* WWT Blue */
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen font-sans">

    <header class="border-b border-slate-800 p-6 sticky top-0 bg-[#0b1120]/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">W</div>
                <h1 class="text-xl font-bold tracking-tight">Marketing <span class="text-blue-500">Agentic Proving Ground</span></h1>
            </div>
            <div class="flex gap-4 items-center">
                <span class="text-xs bg-slate-800 px-3 py-1 rounded-full text-slate-400 border border-slate-700">Live Demo Mode</span>
                <a href="#" class="text-sm hover:text-blue-400">Documentation</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
            <div class="glass-card p-4 rounded-xl">
                <p class="text-xs text-slate-500 uppercase">Active Agents</p>
                <p class="text-2xl font-mono text-blue-400">09</p>
            </div>
            <div class="glass-card p-4 rounded-xl">
                <p class="text-xs text-slate-500 uppercase">Tokens Saved Today</p>
                <p class="text-2xl font-mono text-green-400">14.2k</p>
            </div>
            <div class="glass-card p-4 rounded-xl">
                <p class="text-xs text-slate-500 uppercase">Competitors Tracked</p>
                <p class="text-2xl font-mono text-purple-400">05</p>
            </div>
            <div class="glass-card p-4 rounded-xl">
                <p class="text-xs text-slate-500 uppercase">Market Sentiment</p>
                <p class="text-2xl font-mono text-yellow-400">Bullish</p>
            </div>
        </div>

        <div id="agent-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-[#0f172a] w-full max-w-2xl rounded-2xl border border-slate-700 p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
