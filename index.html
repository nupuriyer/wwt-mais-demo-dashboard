<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWT | Marketing Agentic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f5f5f9; color: #697a8d; font-family: 'Public Sans', sans-serif; }
        
        /* Sneat-style Card */
        .card {
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 2px 6px 0 rgba(67, 89, 113, 0.12);
            transition: all 0.2s ease-in-out;
            border: none;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 4px 12px 0 rgba(67, 89, 113, 0.2); }

        /* The Top Action Stage */
        #action-stage {
            min-height: 200px;
            border: 2px dashed #d9dee3;
            display: flex;
            align-items: center;
            justify-center;
            transition: all 0.4s ease;
        }
        #action-stage.active { border: none; background: #fff; }

        .btn-primary { background-color: #004a99; color: #fff; }
        .btn-primary:hover { background-color: #003366; }
        
        .icon-box {
            width: 42px; height: 42px;
            border-radius: 0.375rem;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-[#566a7f]">WWT <span class="font-light">Marketing Ops</span></h1>
                <p class="text-sm">Agentic Workflow Proving Ground</p>
            </div>
            <div class="flex gap-2">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase">v2.0 Stable</span>
            </div>
        </div>

        <div id="action-stage-wrapper" class="card p-6 mb-8 overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold uppercase text-[#a1acb8] tracking-widest">Active Workspace</h2>
                <button onclick="clearStage()" class="text-xs text-red-400 hover:underline">Clear Workspace</button>
            </div>
            <div id="action-stage" class="rounded-xl p-8 bg-slate-50">
                <div id="stage-placeholder" class="text-center">
                    <div class="text-slate-300 mb-2"><i data-lucide="mouse-pointer-2" class="mx-auto w-8 h-8"></i></div>
                    <p class="text-sm text-slate-400">Select an agent below to begin your workflow.</p>
                </div>
                <div id="stage-content" class="hidden w-full"></div>
            </div>
        </div>

        <div class="flex justify-center mt-12">
    <div id="agent-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 w-full max-w-5xl justify-items-center">
        </div>
</div>

    </div>

    <script src="app.js"></script>
</body>
</html>
