name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key into HTML
        run: |
          # We inject a script tag directly into index.html before deployment
          # This replaces the comment with the actual secret
          sed -i "s##<script>window.GOOGLE_AI_KEY = '${{ secrets.GEMSTONE_DIAMOND }}';</script>#g" index.html
          
          # Debug check: verify if the injection happened
          if grep -q "window.GOOGLE_AI_KEY" index.html; then
            echo "✅ Injection Successful"
          else
            echo "❌ Injection Failed"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
