name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Create Config
        run: |
          # 1. Create a brand new file with the key as a global variable
          echo "window.API_KEY_INJECTED = '${{ secrets.GEMSTONE_DIAMOND }}';" > config.js
          
          # 2. Verify the file was created (this will show in logs)
          if [ -s config.js ]; then
            echo "✅ config.js created successfully"
          else
            echo "❌ config.js is empty - Check GitHub Secret GEMSTONE_DIAMOND"
            exit 1
          fi
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
