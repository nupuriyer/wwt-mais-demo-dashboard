name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # This replaces the line starting with 'var GOOGLE_AI_KEY' 
          # It doesn't matter what the current value is
          sed -i "s/^var GOOGLE_AI_KEY = .*/var GOOGLE_AI_KEY = '${{ secrets.GEMSTONE_DIAMOND }}';/" app.js
          
          # This check will now fail the build if the secret is empty
          if grep -q "GEMINI_API_KEY_PLACEHOLDER" app.js; then
            echo "❌ Injection Failed"
            exit 1
          else
            echo "✅ Injection Successful"
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
