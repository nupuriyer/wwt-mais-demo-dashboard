name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Inject API Key
        run: |
          # 1. Create a brand new first line with the real secret
          echo "const GOOGLE_AI_KEY = '${{ secrets.GEMSTONE_DIAMOND }}';" > app.js.tmp
          
          # 2. Append everything EXCEPT the first line of the original app.js to the tmp file
          tail -n +2 app.js >> app.js.tmp
          
          # 3. Overwrite the original app.js with the new one
          mv app.js.tmp app.js
          
          echo "✅ Secret Force-Injected successfully."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
