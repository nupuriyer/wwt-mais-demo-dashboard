name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # --- THIS BLOCK FIXES THE 400 ERROR ---
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # ---------------------------------------
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # This command is more robust: it looks for the placeholder and replaces it regardless of quotes
          sed -i 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMSTONE_DIAMOND }}/g' app.js
          
          # This check will show in your GitHub logs if the replacement actually happened
          if grep -q "GEMINI_API_KEY_PLACEHOLDER" app.js; then
            echo "Replacement FAILED"
          else
            echo "Replacement SUCCESSFUL"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
