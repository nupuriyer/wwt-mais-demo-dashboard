name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # 1. Directly replace the placeholder in app.js using a different delimiter
          sed -i "s#GEMINI_API_KEY_PLACEHOLDER#${{ secrets.GEMSTONE_DIAMOND }}#g" app.js
          
          # 2. Also inject it into index.html as a backup
          sed -i "s#</head>#<script>window.GOOGLE_AI_KEY = '${{ secrets.GEMSTONE_DIAMOND }}';</script></head>#g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
