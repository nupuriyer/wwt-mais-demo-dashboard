name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # --- THIS BLOCK FIXES THE 400 ERROR ---
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # ---------------------------------------
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # This version finds the string even if it's inside single or double quotes
          sed -i "s/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMSTONE_DIAMOND }}/g" app.js
          
          # Verification: This will print "FOUND" or "NOT FOUND" in your GitHub Action logs
          if grep -q "${{ secrets.GEMSTONE_DIAMOND }}" app.js; then
            echo "✅ API Key Injection Successful"
          else
            echo "❌ API Key Injection Failed - Placeholder not found"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
