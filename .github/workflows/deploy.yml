name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Prepend & Verify
        run: |
          # 1. Create the inject line
          echo "window.API_KEY_INJECTED = '${{ secrets.GEMSTONE_DIAMOND }}';" > inject.js
          
          # 2. Combine them
          cat inject.js app.js > app.js.new
          mv app.js.new app.js
          
          # 3. Verify the first line (GitHub will mask the actual key with ***)
          head -n 1 app.js
          
          echo "✅ Injection step finished."
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
