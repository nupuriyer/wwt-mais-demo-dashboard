name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Prepend API Key
        run: |
          # 1. Create a temporary file with the global variable
          echo "window.API_KEY_INJECTED = '${{ secrets.GEMSTONE_DIAMOND }}';" > app.js.tmp
          
          # 2. Append your actual app.js content to that temporary file
          cat app.js >> app.js.tmp
          
          # 3. Replace the original app.js with the combined version
          mv app.js.tmp app.js
          
          echo "✅ Secret successfully glued to the top of app.js"
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
