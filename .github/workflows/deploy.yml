name: Deploy with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # Matches the 'GEMINI_API_KEY_PLACEHOLDER' string currently in your app.js
          # Using '#' as a delimiter is a best practice to avoid errors if the key has slashes
          sed -i "s#GEMINI_API_KEY_PLACEHOLDER#${{ secrets.GEMSTONE_DIAMOND }}#g" app.js
          
          # Verification step: This checks if the placeholder is GONE.
          # If it's still there, the build will fail and tell you why.
          if grep -q "GEMINI_API_KEY_PLACEHOLDER" app.js; then
            echo "❌ API Key Injection Failed - Placeholder still exists"
            exit 1
          else
            echo "✅ API Key Injection Successful"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
